version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: textile-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: textile-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_TYPE=local
      - LOCAL_STORAGE_DIR=/app/data/storage
      - ALLOW_MODEL_DOWNLOADS=false
      - DEBUG=true
    volumes:
      - shared_storage:/app/data/storage
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: textile-worker
    command: celery -A app.workers.celery_worker.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_TYPE=local
      - LOCAL_STORAGE_DIR=/app/data/storage
      - ALLOW_MODEL_DOWNLOADS=false
      - DEBUG=true
    volumes:
      - shared_storage:/app/data/storage
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: .
    container_name: textile-beat
    command: celery -A app.workers.celery_worker.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - STORAGE_TYPE=local
      - LOCAL_STORAGE_DIR=/app/data/storage
      - ALLOW_MODEL_DOWNLOADS=false
      - DEBUG=true
    volumes:
      - shared_storage:/app/data/storage
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  shared_storage:
